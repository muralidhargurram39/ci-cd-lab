version: "3.9"

services:

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile

    image: custom-jenkins:lts
    container_name: jenkins

    restart: unless-stopped

    group_add:
      - "1001"

    ports:
      - "8080:8080"
      - "50000:50000"

    environment:
      DOCKER_BUILDKIT: "1"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./jenkins/kube:/var/jenkins_home/.kube:ro

    networks:
      - cicd-network
      - kind

    depends_on:
      - sonarqube
      - nexus

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube

    restart: unless-stopped

    ports:
      - "9000:9000"

    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-postgres:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: Password@123

    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

    depends_on:
      - sonar-postgres

    networks:
      - cicd-network

  sonar-postgres:
    image: postgres:16
    container_name: sonar-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: sonar
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: Password@123

    volumes:
      - sonar_postgres_data:/var/lib/postgresql/data

    networks:
      - cicd-network

  nexus:
    image: sonatype/nexus3
    container_name: nexus

    restart: unless-stopped

    ports:
      - "8081:8081"
      - "8082:8082"
      - "8083:8083"

    volumes:
      - nexus_data:/nexus-data

    networks:
      - cicd-network

  tomcat:
    image: tomcat:10.1-jdk17
    container_name: tomcat

    restart: unless-stopped

    ports:
      - "9090:8080"

    volumes:
      - tomcat_webapps:/usr/local/tomcat/webapps

    networks:
      - cicd-network

volumes:
  jenkins_home:
  sonar_postgres_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  nexus_data:
  tomcat_webapps:

networks:
  cicd-network:
    driver: bridge

  kind:
    external: true
